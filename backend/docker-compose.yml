services:
  web-kit-backend:
    image: web-kit-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web-kit-backend
    restart: unless-stopped
    shm_size: "1gb"
    mem_limit: 4g
    # Default: bind to 127.0.0.1 only. The CDP endpoint and noVNC give full
    # browser-session takeover to anyone who can reach them, so we don't
    # publish them on 0.0.0.0 by default. To expose to the LAN, set
    # WEB_KIT_BIND=0.0.0.0 in .env (and set WEB_KIT_VNC_PASSWORD as well —
    # supervisord uses x11vnc -nopw when it's empty).
    ports:
      - "${WEB_KIT_BIND:-127.0.0.1}:8082:8082"   # SearxNG via Caddy  (web-kit searxng-search)
      - "${WEB_KIT_BIND:-127.0.0.1}:9223:9223"   # Chrome CDP (web-kit browser-fetch)
      - "${WEB_KIT_BIND:-127.0.0.1}:6080:6080"   # noVNC (manual cookie login)
    environment:
      WEB_KIT_VNC_PASSWORD: ${WEB_KIT_VNC_PASSWORD:-}
      WEB_KIT_API_KEY: ${WEB_KIT_API_KEY:?WEB_KIT_API_KEY must be set in .env}
      WEB_KIT_NOVNC_HASH: ${WEB_KIT_NOVNC_HASH:?WEB_KIT_NOVNC_HASH must be set in .env}
      SEMANTIC_SCHOLAR_API_KEY: ${SEMANTIC_SCHOLAR_API_KEY:-}
    volumes:
      - ./searxng-settings:/etc/searxng:rw
      - ./searxng-engines/semantic_scholar_api.py:/usr/local/searxng/searx/engines/semantic_scholar_api.py:ro
      - chrome-profile:/data/chrome-profile
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

volumes:
  chrome-profile:
